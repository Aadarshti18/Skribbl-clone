# Render Blueprint — deploy both services with "New + Blueprint" pointing at this repo.
# Docs: https://render.com/docs/blueprint-spec
#
# This defines two services:
#   1. skribbl-clone-server — a Node web service running the Express + Socket.IO backend
#   2. skribbl-clone-client — a static site serving the built React frontend
#
# After the first deploy, set CLIENT_ORIGIN on the server to the client's
# live URL, and VITE_SERVER_URL on the client to the server's live URL,
# then redeploy the client so the build picks up the env var.

services:
  - type: web
    name: skribbl-clone-server
    runtime: node
    plan: free
    region: oregon
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: PORT
        value: 3001
      - key: CLIENT_ORIGIN
        value: https://skribbl-clone-client.onrender.com

  - type: web
    name: skribbl-clone-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SERVER_URL
        value: https://skribbl-clone-server.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html